<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo.</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d0e13;
      --surface:    #181922;
      --surface2:   #1e2030;
      --border:     #2a2d42;
      --text:       #e8eaf0;
      --text-muted: #5a6080;
      --accent:     #6c5ce7;
      --accent-dim: #2d2660;
      --green:      #34d399;
      --green-dot:  #22c55e;
      --green-dim:  #14532d;
      --red:        #f87171;
      --red-dot:    #ef4444;
      --red-dim:    #450a0a;
      --yellow:     #fbbf24;
      --yellow-dot: #eab308;
      --yellow-dim: #422006;
      --radius:     14px;
      --radius-sm:  9px;
      --tr:         .16s cubic-bezier(.4,0,.2,1);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 16px 100px;
    }

    .app { width: 100%; max-width: 720px; }

    /* ── Header ─────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 32px;
    }
    .logo { font-size: 2rem; font-weight: 800; letter-spacing: -.03em; line-height: 1; }
    .logo span { color: var(--accent); }
    .logo-date { font-size: .82rem; color: var(--text-muted); margin-top: 5px; }

    .stats { display: flex; gap: 8px; padding-top: 4px; }
    .stat-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 5px 14px;
      font-size: .8rem;
      color: var(--text-muted);
      display: flex; align-items: center; gap: 5px;
      white-space: nowrap;
    }
    .stat-chip b { color: var(--text); font-size: .88rem; }
    .stat-done b { color: var(--green); }
    .stat-active b { color: var(--accent); }

    /* ── Add card ────────────────────────────────────────────── */
    .add-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 18px 16px;
      margin-bottom: 16px;
    }
    .add-row { display: flex; gap: 10px; }
    .input-main {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 1rem;
      padding: 8px 4px;
      outline: none;
    }
    .input-main::placeholder { color: var(--text-muted); }

    .btn-add {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      width: 42px; height: 42px;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity var(--tr), transform var(--tr);
    }
    .btn-add:hover { opacity: .85; }
    .btn-add:active { transform: scale(.93); }

    .add-divider { height: 1px; background: var(--border); margin: 10px 0; }

    .add-meta { display: flex; gap: 8px; }
    .input-desc {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: .85rem;
      padding: 4px 0;
      outline: none;
    }
    .input-desc::placeholder { color: var(--text-muted); }
    .select-meta, .input-date {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: .8rem;
      padding: 5px 10px;
      outline: none;
      cursor: pointer;
      transition: border-color var(--tr);
    }
    .select-meta:focus, .input-date:focus { border-color: var(--accent); }
    .input-date { color-scheme: dark; }

    /* ── Toolbar ─────────────────────────────────────────────── */
    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .search-wrap { position: relative; }
    .search-wrap svg {
      position: absolute; left: 10px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted); pointer-events: none;
    }
    .input-search {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: .84rem;
      padding: 7px 12px 7px 32px;
      width: 170px;
      outline: none;
      transition: border-color var(--tr), width var(--tr);
    }
    .input-search::placeholder { color: var(--text-muted); }
    .input-search:focus { border-color: var(--accent); width: 200px; }

    /* Filter pill groups */
    .filter-group {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    .filter-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: .82rem;
      padding: 7px 14px;
      cursor: pointer;
      transition: background var(--tr), color var(--tr);
      white-space: nowrap;
    }
    .filter-btn:hover:not(.active) { background: var(--surface2); color: var(--text); }
    .filter-btn.active { background: var(--accent); color: #fff; font-weight: 600; }

    /* Priority dot buttons */
    .p-dot-btn {
      background: transparent;
      border: none;
      display: flex; align-items: center; justify-content: center;
      padding: 7px 10px;
      cursor: pointer;
      transition: background var(--tr);
    }
    .p-dot-btn:hover:not(.active) { background: var(--surface2); }
    .p-dot-btn.active { background: var(--accent-dim); }
    .p-dot {
      width: 13px; height: 13px;
      border-radius: 50%;
      display: block;
      flex-shrink: 0;
    }
    .p-dot.red    { background: var(--red-dot); }
    .p-dot.yellow { background: var(--yellow-dot); }
    .p-dot.green  { background: var(--green-dot); }

    .sort-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: .82rem;
      padding: 7px 10px;
      outline: none;
      cursor: pointer;
      margin-left: auto;
    }

    /* ── Progress ─────────────────────────────────────────────── */
    .progress-wrap {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 18px;
    }
    .progress-track {
      flex: 1; height: 3px;
      background: var(--surface2); border-radius: 999px; overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--green));
      border-radius: 999px;
      transition: width .4s cubic-bezier(.4,0,.2,1);
    }
    .progress-label { font-size: .75rem; color: var(--text-muted); white-space: nowrap; }

    /* ── Bulk bar ─────────────────────────────────────────────── */
    .bulk-bar {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 7px 12px;
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 8px;
      font-size: .8rem; color: var(--text-muted);
    }
    .bulk-bar.hidden { display: none; }
    .bulk-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      font-size: .76rem;
      padding: 3px 10px;
      cursor: pointer;
      transition: background var(--tr), color var(--tr), border-color var(--tr);
    }
    .bulk-btn:hover { background: var(--surface); color: var(--text); }
    .bulk-btn.danger:hover { background: var(--red-dim); color: var(--red); border-color: var(--red); }

    /* ── Todo list ────────────────────────────────────────────── */
    .todo-list { display: flex; flex-direction: column; gap: 8px; }

    .empty-state {
      text-align: center; padding: 70px 0; color: var(--text-muted);
    }
    .empty-state .icon { font-size: 3.5rem; margin-bottom: 14px; }
    .empty-state p { font-size: .9rem; }

    /* ── Todo item ────────────────────────────────────────────── */
    .todo-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex; gap: 12px; align-items: flex-start;
      transition: border-color var(--tr), box-shadow var(--tr);
      animation: fadeIn .18s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .todo-item:hover { border-color: #3a3f5e; box-shadow: 0 2px 14px rgba(0,0,0,.35); }
    .todo-item.done { opacity: .5; }
    .todo-item.priority-high   { border-left: 3px solid var(--red-dot); }
    .todo-item.priority-medium { border-left: 3px solid var(--yellow-dot); }
    .todo-item.priority-low    { border-left: 3px solid var(--green-dot); }

    /* Checkbox */
    .check-wrap { padding-top: 1px; flex-shrink: 0; }
    .checkbox {
      appearance: none;
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-radius: 6px; cursor: pointer;
      position: relative;
      transition: background var(--tr), border-color var(--tr);
      display: block;
    }
    .checkbox:checked { background: var(--accent); border-color: var(--accent); }
    .checkbox:checked::after {
      content: '';
      position: absolute; left: 5px; top: 2px;
      width: 6px; height: 10px;
      border: 2px solid #fff; border-top: none; border-left: none;
      transform: rotate(45deg);
    }
    .checkbox:hover:not(:checked) { border-color: var(--accent); }

    /* Body */
    .todo-body { flex: 1; min-width: 0; }
    .todo-title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .todo-title {
      font-size: .95rem; font-weight: 500; word-break: break-word;
    }
    .done .todo-title { text-decoration: line-through; color: var(--text-muted); }

    .badge-priority {
      font-size: .68rem; font-weight: 700; border-radius: 999px;
      padding: 2px 8px; text-transform: uppercase; letter-spacing: .05em;
      display: flex; align-items: center; gap: 4px;
    }
    .badge-high   { background: var(--red-dim);    color: var(--red); }
    .badge-medium { background: var(--yellow-dim); color: var(--yellow); }
    .badge-low    { background: var(--green-dim);  color: var(--green); }
    .badge-priority::before {
      content: ''; display: block;
      width: 6px; height: 6px; border-radius: 50%;
    }
    .badge-high::before   { background: var(--red-dot); }
    .badge-medium::before { background: var(--yellow-dot); }
    .badge-low::before    { background: var(--green-dot); }

    .todo-desc { font-size: .8rem; color: var(--text-muted); margin-top: 4px; word-break: break-word; }
    .todo-meta { display: flex; gap: 10px; margin-top: 6px; flex-wrap: wrap; }
    .meta-chip { font-size: .74rem; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
    .meta-chip.overdue { color: var(--red); }

    /* Edit mode */
    .edit-area { width: 100%; }
    .edit-title, .edit-desc {
      width: 100%;
      background: var(--surface2); border: 1px solid var(--accent);
      border-radius: var(--radius-sm); color: var(--text);
      font-size: .9rem; padding: 6px 10px; outline: none; margin-bottom: 6px;
    }
    .edit-row { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
    .edit-select, .edit-date {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text);
      font-size: .8rem; padding: 5px 8px; outline: none;
    }
    .edit-date { color-scheme: dark; }
    .edit-actions { display: flex; gap: 6px; }
    .btn-save, .btn-cancel-edit {
      font-size: .8rem; border: none; border-radius: var(--radius-sm);
      padding: 5px 14px; cursor: pointer; transition: opacity var(--tr);
    }
    .btn-save { background: var(--accent); color: #fff; }
    .btn-cancel-edit { background: var(--surface2); color: var(--text-muted); }
    .btn-save:hover, .btn-cancel-edit:hover { opacity: .8; }

    /* Actions */
    .todo-actions {
      display: flex; gap: 4px; flex-shrink: 0;
      opacity: 0; transition: opacity var(--tr);
    }
    .todo-item:hover .todo-actions { opacity: 1; }
    .action-btn {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text-muted);
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background var(--tr), color var(--tr), border-color var(--tr);
    }
    .action-btn:hover { background: var(--border); color: var(--text); }
    .action-btn.del:hover { background: var(--red-dim); color: var(--red); border-color: var(--red); }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header class="header">
    <div>
      <div class="logo">Todo<span>.</span></div>
      <div class="logo-date" id="dateLabel"></div>
    </div>
    <div class="stats">
      <div class="stat-chip"><b id="statTotal">0</b> 件</div>
      <div class="stat-chip stat-done"><b id="statDone">0</b> 完了</div>
      <div class="stat-chip stat-active"><b id="statActive">0</b> 残り</div>
    </div>
  </header>

  <!-- Add card -->
  <div class="add-card">
    <div class="add-row">
      <input class="input-main" id="inputTitle" type="text" placeholder="タスクを追加..." />
      <button class="btn-add" id="btnAdd" title="追加">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.8" viewBox="0 0 24 24">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>
    <div class="add-divider"></div>
    <div class="add-meta">
      <input class="input-desc" id="inputDesc" type="text" placeholder="説明（任意）" />
      <select class="select-meta" id="inputPriority">
        <option value="none">優先度なし</option>
        <option value="high">🔴 高</option>
        <option value="medium">🟡 中</option>
        <option value="low">🟢 低</option>
      </select>
      <input class="input-date" id="inputDue" type="date" />
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input class="input-search" id="inputSearch" type="text" placeholder="検索..." />
    </div>

    <div class="filter-group" id="filterStatus">
      <button class="filter-btn active" data-filter="all">すべて</button>
      <button class="filter-btn" data-filter="active">未完了</button>
      <button class="filter-btn" data-filter="done">完了</button>
    </div>

    <div class="filter-group" id="filterPriority">
      <button class="filter-btn active" data-pfilter="all">全優先度</button>
      <button class="p-dot-btn" data-pfilter="high" title="高">
        <span class="p-dot red"></span>
      </button>
      <button class="p-dot-btn" data-pfilter="medium" title="中">
        <span class="p-dot yellow"></span>
      </button>
      <button class="p-dot-btn" data-pfilter="low" title="低">
        <span class="p-dot green"></span>
      </button>
    </div>

    <select class="sort-select" id="sortSelect">
      <option value="created_desc">新しい順</option>
      <option value="created_asc">古い順</option>
      <option value="due_asc">期限順</option>
      <option value="priority_desc">優先度順</option>
    </select>
  </div>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <span class="progress-label" id="progressLabel">0 / 0</span>
  </div>

  <!-- Bulk bar -->
  <div class="bulk-bar hidden" id="bulkBar">
    <span id="bulkCount"></span>
    <button class="bulk-btn" id="btnCompleteAll">すべて完了</button>
    <button class="bulk-btn" id="btnClearDone">完了を削除</button>
    <button class="bulk-btn danger" id="btnDeleteAll">すべて削除</button>
  </div>

  <!-- List -->
  <div class="todo-list" id="todoList"></div>

</div>
<script>
const STORAGE_KEY = 'todos_v1';
let todos = load();
let filterStatus   = 'all';
let filterPriority = 'all';
let sortKey        = 'created_desc';
let searchQuery    = '';

function load() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; }
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(todos)); }
function uid()  { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

const PRIORITY_ORDER = { high:0, medium:1, low:2, none:3 };

function filtered() {
  let list = todos.slice();
  if (filterStatus === 'active') list = list.filter(t => !t.done);
  else if (filterStatus === 'done') list = list.filter(t => t.done);
  if (filterPriority !== 'all') list = list.filter(t => t.priority === filterPriority);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(t => t.title.toLowerCase().includes(q) || (t.desc||'').toLowerCase().includes(q));
  }
  list.sort((a,b) => {
    if (sortKey==='created_asc')  return a.createdAt - b.createdAt;
    if (sortKey==='created_desc') return b.createdAt - a.createdAt;
    if (sortKey==='due_asc') {
      if (!a.due&&!b.due) return 0; if (!a.due) return 1; if (!b.due) return -1;
      return a.due.localeCompare(b.due);
    }
    if (sortKey==='priority_desc') {
      return (PRIORITY_ORDER[a.priority]??3) - (PRIORITY_ORDER[b.priority]??3) || b.createdAt - a.createdAt;
    }
    return 0;
  });
  return list;
}

function todayStr() { return new Date().toISOString().slice(0,10); }
function formatDate(s) { if(!s) return null; const [y,m,d]=s.split('-'); return `${+m}月${+d}日`; }
function isOverdue(due) { return due && due < todayStr(); }

function render() {
  save();
  const total = todos.length, done = todos.filter(t=>t.done).length;
  document.getElementById('statTotal').textContent  = total;
  document.getElementById('statDone').textContent   = done;
  document.getElementById('statActive').textContent = total - done;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressLabel').textContent = `${done} / ${total}`;
  const vis = filtered().length > 0;
  document.getElementById('bulkBar').classList.toggle('hidden', !vis);
  document.getElementById('bulkCount').textContent = `${filtered().length} 件表示中`;
  renderList();
}

function renderList() {
  const list = filtered();
  const el   = document.getElementById('todoList');
  if (!list.length) {
    el.innerHTML = `<div class="empty-state">
      <div class="icon">✅</div>
      <p>${searchQuery||filterStatus!=='all'||filterPriority!=='all'
        ? '条件に一致するタスクがありません' : 'タスクを追加してみましょう！'}</p>
    </div>`;
    return;
  }
  el.innerHTML = list.map(t => itemHTML(t)).join('');
  el.querySelectorAll('.checkbox').forEach(cb =>
    cb.addEventListener('change', e => {
      const t = todos.find(x => x.id === e.target.closest('.todo-item').dataset.id);
      if (t) { t.done = cb.checked; render(); }
    })
  );
  el.querySelectorAll('.action-btn.edit').forEach(btn =>
    btn.addEventListener('click', e => startEdit(e.target.closest('.todo-item').dataset.id))
  );
  el.querySelectorAll('.action-btn.del').forEach(btn =>
    btn.addEventListener('click', e => {
      todos = todos.filter(t => t.id !== e.target.closest('.todo-item').dataset.id);
      render();
    })
  );
}

function itemHTML(t) {
  const over = isOverdue(t.due);
  const pc   = t.priority !== 'none' ? ` priority-${t.priority}` : '';
  const badge = t.priority !== 'none'
    ? `<span class="badge-priority badge-${t.priority}">${
        t.priority==='high'?'高':t.priority==='medium'?'中':'低'}</span>` : '';
  const dueHtml = t.due
    ? `<span class="meta-chip${over&&!t.done?' overdue':''}">
        <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        ${over&&!t.done?'期限切れ: ':''}${formatDate(t.due)}</span>` : '';
  const createdHtml = `<span class="meta-chip">
    <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    ${new Date(t.createdAt).toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'})}</span>`;
  return `<div class="todo-item${pc}${t.done?' done':''}" data-id="${t.id}">
    <div class="check-wrap"><input class="checkbox" type="checkbox"${t.done?' checked':''}></div>
    <div class="todo-body">
      <div class="todo-title-row">
        <span class="todo-title">${esc(t.title)}</span>${badge}
      </div>
      ${t.desc?`<div class="todo-desc">${esc(t.desc)}</div>`:''}
      <div class="todo-meta">${dueHtml}${createdHtml}</div>
    </div>
    <div class="todo-actions">
      <button class="action-btn edit" title="編集">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>
      </button>
      <button class="action-btn del" title="削除">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
      </button>
    </div>
  </div>`;
}

function startEdit(id) {
  const t = todos.find(x => x.id === id); if (!t) return;
  const item = document.querySelector(`.todo-item[data-id="${id}"]`);
  item.querySelector('.todo-body').innerHTML = `<div class="edit-area">
    <input class="edit-title" type="text" value="${esc(t.title)}">
    <input class="edit-desc"  type="text" value="${esc(t.desc||'')}" placeholder="説明（任意）">
    <div class="edit-row">
      <select class="edit-select">
        <option value="none"${t.priority==='none'?' selected':''}>優先度なし</option>
        <option value="high"${t.priority==='high'?' selected':''}>🔴 高</option>
        <option value="medium"${t.priority==='medium'?' selected':''}>🟡 中</option>
        <option value="low"${t.priority==='low'?' selected':''}>🟢 低</option>
      </select>
      <input class="edit-date" type="date" value="${t.due||''}">
    </div>
    <div class="edit-actions">
      <button class="btn-save">保存</button>
      <button class="btn-cancel-edit">キャンセル</button>
    </div>
  </div>`;
  item.querySelector('.todo-actions').style.opacity = '0';
  item.querySelector('.btn-save').addEventListener('click', () => {
    const nt = item.querySelector('.edit-title').value.trim(); if (!nt) return;
    t.title = nt;
    t.desc  = item.querySelector('.edit-desc').value.trim();
    t.priority = item.querySelector('.edit-select').value;
    t.due   = item.querySelector('.edit-date').value || null;
    render();
  });
  item.querySelector('.btn-cancel-edit').addEventListener('click', () => render());
  item.querySelector('.edit-title').focus();
}

function addTodo() {
  const title = document.getElementById('inputTitle').value.trim(); if (!title) return;
  todos.unshift({
    id: uid(), title,
    desc:     document.getElementById('inputDesc').value.trim(),
    priority: document.getElementById('inputPriority').value,
    due:      document.getElementById('inputDue').value || null,
    done: false, createdAt: Date.now(),
  });
  document.getElementById('inputTitle').value    = '';
  document.getElementById('inputDesc').value     = '';
  document.getElementById('inputPriority').value = 'none';
  document.getElementById('inputDue').value      = '';
  render();
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Events ─────────────────────────────────────────────── */
document.getElementById('btnAdd').addEventListener('click', addTodo);
document.getElementById('inputTitle').addEventListener('keydown', e => { if(e.key==='Enter') addTodo(); });

document.getElementById('filterStatus').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn'); if (!btn) return;
  filterStatus = btn.dataset.filter;
  document.querySelectorAll('#filterStatus .filter-btn').forEach(b => b.classList.toggle('active', b===btn));
  render();
});

document.getElementById('filterPriority').addEventListener('click', e => {
  const btn = e.target.closest('[data-pfilter]'); if (!btn) return;
  filterPriority = btn.dataset.pfilter;
  document.querySelectorAll('#filterPriority [data-pfilter]').forEach(b => b.classList.toggle('active', b===btn));
  render();
});

document.getElementById('sortSelect').addEventListener('change', e => { sortKey = e.target.value; render(); });
document.getElementById('inputSearch').addEventListener('input', e => { searchQuery = e.target.value; render(); });

document.getElementById('btnCompleteAll').addEventListener('click', () => { filtered().forEach(t=>t.done=true); render(); });
document.getElementById('btnClearDone').addEventListener('click', () => {
  const ids = new Set(todos.filter(t=>t.done).map(t=>t.id));
  todos = todos.filter(t=>!ids.has(t.id)); render();
});
document.getElementById('btnDeleteAll').addEventListener('click', () => {
  if (!confirm('表示中のタスクをすべて削除しますか？')) return;
  const ids = new Set(filtered().map(t=>t.id));
  todos = todos.filter(t=>!ids.has(t.id)); render();
});

/* ── Init ───────────────────────────────────────────────── */
document.getElementById('dateLabel').textContent =
  new Date().toLocaleDateString('ja-JP', {year:'numeric',month:'long',day:'numeric',weekday:'long'});

render();
</script>
</body>
</html>
